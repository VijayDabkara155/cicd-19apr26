apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jenkins-nginx
  template:
    metadata:
      labels:
        app: jenkins-nginx
    spec:
      containers:
      - name: nginx
        image: YOUR_DOCKERHUB_USERNAME/jenkins-nginx:latest
        ports:
        - containerPort: 80
